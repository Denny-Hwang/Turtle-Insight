# Pre-commit hooks: ruff (lint+format) and mypy (strict on src/).
# Install with: make setup  (runs `pre-commit install`).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - sqlalchemy>=2.0
          - fastapi>=0.111
          - httpx>=0.27
          - types-PyYAML>=6.0
          - types-jsonschema>=4.22
