# Local dev infra (v1+). App runs in a local venv; these are backing services.
# Postgres ships the pgvector extension (used by storage.rag.VectorStore).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: turtle
      POSTGRES_PASSWORD: turtle
      POSTGRES_DB: turtle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turtle"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
